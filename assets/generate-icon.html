<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Eatsy — Générateur d'icône</title>
  <style>
    @font-face {
      font-family: 'Ionicons';
      src: url('../node_modules/@expo/vector-icons/build/vendor/react-native-vector-icons/Fonts/Ionicons.ttf') format('truetype');
    }
    body { background: #111; display: flex; flex-direction: column; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; gap: 24px; }
    canvas { width: 256px; height: 256px; border-radius: 20px;
             box-shadow: 0 8px 40px rgba(0,107,27,0.5); }
    button { background: #006b1b; color: white; border: none; padding: 14px 36px;
             border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 600; }
    button:hover { opacity: 0.85; }
    p { color: rgba(255,255,255,0.45); font-size: 13px; margin: 0; }
  </style>
</head>
<body>
  <canvas id="c" width="1024" height="1024"></canvas>
  <button onclick="download()">Télécharger icon.png (1024×1024)</button>
  <p>Remplace ensuite assets/icon.png par ce fichier.</p>

  <script>
    const PRIMARY = '#006b1b';
    const ICON_CHAR = String.fromCodePoint(62773); // Ionicons "restaurant"

    function roundedRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y,     x + w, y + r,     r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x,      y + h, x, y + h - r,    r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x,      y,     x + r, y,         r);
      ctx.closePath();
    }

    function drawIcon(ctx) {
      const S = 1024;

      // Background
      roundedRect(ctx, 0, 0, S, S, 220);
      ctx.fillStyle = PRIMARY;
      ctx.fill();

      // Decorative circle top-right
      ctx.beginPath();
      ctx.arc(800, 190, 300, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.07)';
      ctx.fill();

      // Decorative circle bottom-left
      ctx.beginPath();
      ctx.arc(200, 840, 190, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.fill();

      // Restaurant icon (Ionicons glyph)
      ctx.fillStyle = 'white';
      ctx.font = '560px Ionicons';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(ICON_CHAR, 512, 528);
    }

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    document.fonts.ready.then(() => {
      drawIcon(ctx);
    });

    function download() {
      drawIcon(ctx);
      const a = document.createElement('a');
      a.download = 'icon.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
