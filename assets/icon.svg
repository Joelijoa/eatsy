    <rect x="-16" y="-290" width="18" height="145" rx="9" fill="white"/>
    <rect x="14"  y="-290" width="18" height="145" rx="9" fill="white"/>
    <rect x="44"  y="-290" width="18" height="145" rx="9" fill="white"/>
