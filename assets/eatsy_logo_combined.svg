<svg width="100%" viewBox="0 0 690 270" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo Eatsy complet — icône dark mode + wordmark</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Fourchette dark mode combinée avec le wordmark Eatsy serif et tagline</desc>

  <!-- Fond crème -->
  <rect x="0" y="0" width="680" height="260" rx="20" fill="#F0EFEA" style="fill:rgb(240, 239, 234);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- ── ICÔNE dark mode ── -->
  <rect x="52" y="38" width="130" height="184" rx="32" fill="#1A2E1A" style="fill:rgb(26, 46, 26);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Fourchette symétrique, centre icône x=117 -->
  <!-- Dent gauche : x=97, dent centrale : x=114.5, dent droite : x=132 -->
  <rect x="95" y="68" width="4.5" height="46" rx="2.25" fill="#4CAF50" style="fill:rgb(76, 175, 80);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="114.5" y="68" width="4.5" height="46" rx="2.25" fill="#4CAF50" style="fill:rgb(76, 175, 80);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="134" y="68" width="4.5" height="46" rx="2.25" fill="#4CAF50" style="fill:rgb(76, 175, 80);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Arc jonction -->
  <path d="M97.25 114 Q97.25 126 116.75 129 Q136.25 126 136.25 114" fill="none" stroke="#4CAF50" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgb(76, 175, 80);color:rgb(255, 255, 255);stroke-width:4.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Manche centré x=116.75 -->
  <rect x="114.5" y="127" width="4.5" height="72" rx="2.25" fill="#4CAF50" style="fill:rgb(76, 175, 80);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Point orange -->
  <circle cx="116.75" cy="210" r="9.5" fill="#FF9800" style="fill:rgb(255, 152, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- ── WORDMARK ── -->
  <!-- "Eatsy" serif -->
  <text x="212" y="148" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#1A2E1A" letter-spacing="-2" text-anchor="start" style="fill:rgb(26, 46, 26);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:72px;font-weight:700;text-anchor:start;dominant-baseline:auto">Eatsy</text>

  <!-- Trait teal sous le "a" — aligné visuellement -->
  <rect x="226" y="158" width="38" height="3.5" rx="1.75" fill="#008080" style="fill:rgb(0, 128, 128);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Tagline -->
  <text x="213" y="188" font-family="Arial, sans-serif" font-size="13.5" fill="#73796F" text-anchor="start" letter-spacing="3" style="fill:rgb(115, 121, 111);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:13.5px;font-weight:400;text-anchor:start;dominant-baseline:auto">MEAL PLANNER &amp; BUDGET</text>
</svg>